version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: mysql_signalement
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: signalementDb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "admin",
          "-padmin123",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

