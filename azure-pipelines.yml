trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
      - release/*
  paths:
    exclude:
      - '**/*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main
      - develop

variables:
  MAVEN_OPTS: '-Xmx1024m'
  DOCKERHUB_REPOSITORY: '$(DOCKERHUB_USERNAME)/gestion-signalement'
  IMAGE_NAME: 'gestion-signalement'
  IMAGE_TAG: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

  - stage: Build
    displayName: 'Build & Tests'
    jobs:
      - job: MavenBuild
        displayName: 'Compilation Maven + Tests unitaires'
        services:
          mysql:
            image: mysql:5.7
            env:
              MYSQL_DATABASE: signalementDb
              MYSQL_USER: admin
              MYSQL_PASSWORD: admin123
              MYSQL_ROOT_PASSWORD: root123
            ports:
              - 3306:3306
            options: >-
              --health-cmd="mysqladmin ping -h localhost -u admin -padmin123"
              --health-interval=10s
              --health-timeout=5s
              --health-retries=10
              --health-start-period=30s

        steps:
          - task: JavaToolInstaller@0
            displayName: 'Installer JDK 8'
            inputs:
              versionSpec: '8'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - task: Cache@2
            displayName: 'Cache dépendances Maven'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: '$(HOME)/.m2/repository'

          - task: Maven@3
            displayName: 'mvn clean verify (build + tests + JaCoCo)'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean verify'
              options: '-Dmaven.test.failure.ignore=false'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.8'
              mavenVersionOption: 'Default'
            env:
              SPRING_DATASOURCE_URL: 'jdbc:mysql://localhost:3306/signalementDb?createDatabaseIfNotExist=true&serverTimezone=UTC'
              SPRING_DATASOURCE_USERNAME: 'admin'
              SPRING_DATASOURCE_PASSWORD: 'admin123'
              SPRING_JPA_HIBERNATE_DDL_AUTO: 'create'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publier couverture JaCoCo'
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: '**/target/site/jacoco/jacoco.xml'
              reportDirectory: '**/target/site/jacoco'
              failIfCoverageEmpty: false

          - task: PublishBuildArtifacts@1
            displayName: 'Publier JAR'
            inputs:
              PathtoPublish: 'target/gestion-signalement.jar'
              ArtifactName: 'jar-artifact'
              publishLocation: 'Container'

  - stage: CodeAnalysis
    displayName: 'Analyse de code statique'
    dependsOn: Build
    condition: succeeded()
    jobs:

      - job: StaticAnalysis
        displayName: 'Checkstyle & SpotBugs'
        steps:

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '8'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: '$(HOME)/.m2/repository'

          - task: Maven@3
            displayName: 'Checkstyle'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'checkstyle:checkstyle'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.8'

          - task: Maven@3
            displayName: 'SpotBugs'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'compile spotbugs:spotbugs'
              options: '-DskipTests'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.8'

          - task: PublishBuildArtifacts@1
            displayName: 'Publier rapports SpotBugs'
            inputs:
              PathtoPublish: 'target/spotbugs'
              ArtifactName: 'spotbugs-report'

      # ============================
      # SONARQUBE JOB DISABLED
      # ============================
      # - job: SonarQube
      #   displayName: 'Analyse SonarQube (DISABLED)'
      #   variables:
      #     - group: sonar-config
      #   steps:
      #     - task: JavaToolInstaller@0
      #       displayName: 'Installer JDK 17 (requis par sonar-maven-plugin)'
      #       inputs:
      #         versionSpec: '17'
      #         jdkArchitectureOption: 'x64'
      #         jdkSourceOption: 'PreInstalled'
