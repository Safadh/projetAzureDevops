      #     - task: Cache@2
      #       inputs:
      #         key: 'maven | "$(Agent.OS)" | **/pom.xml'
      #         restoreKeys: |
      #           maven | "$(Agent.OS)"
      #           maven
      #         path: '$(HOME)/.m2/repository'
      #
      #     - task: Maven@3
      #       displayName: 'Build + SonarQube analyse (Maven)'
      #       inputs:
      #         mavenPomFile: 'pom.xml'
      #         goals: 'verify sonar:sonar'
      #         options: >
      #           -DskipTests
      #           -Dsonar.projectKey=$(SONAR_PROJECT_KEY)
