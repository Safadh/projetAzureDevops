trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
      - release/*
  paths:
    exclude:
      - '**/*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main
      - develop

variables:
  MAVEN_OPTS: '-Xmx1024m'
  DOCKERHUB_REPOSITORY: '$(DOCKERHUB_USERNAME)/gestion-signalement'
  IMAGE_NAME: 'gestion-signalement'
  IMAGE_TAG: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

  - stage: Build
    displayName: 'Build & Tests'
    jobs:
      - job: MavenBuild
        displayName: 'Compilation Maven + Tests unitaires'
        services:
          mysql:
            image: mysql:5.7
            env:
              MYSQL_DATABASE: signalementDb
              MYSQL_USER: admin
              MYSQL_PASSWORD: admin123
              MYSQL_ROOT_PASSWORD: root123
            ports:
              - 3306:3306
            options: >-
              --health-cmd="mysqladmin ping -h localhost -u admin -padmin123"
              --health-interval=10s
              --health-timeout=5s
              --health-retries=10
              --health-start-period=30s

        steps:
          - task: JavaToolInstaller@0
            displayName: 'Installer JDK 8'
            inputs:
              versionSpec: '8'
              jdkArchitectureOption: 'x64'

          - task: Cache@2
            displayName: 'Cache dépendances Maven'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: '$(HOME)/.m2/repository'

          - task: Maven@3
            displayName: 'mvn clean verify'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean verify'
              options: '-Dmaven.test.failure.ignore=false'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.8'
            env:
              SPRING_DATASOURCE_URL: 'jdbc:mysql://localhost:3306/signalementDb?createDatabaseIfNotExist=true&serverTimezone=UTC'
              SPRING_DATASOURCE_USERNAME: 'admin'
              SPRING_DATASOURCE_PASSWORD: 'admin123'
              SPRING_JPA_HIBERNATE_DDL_AUTO: 'create'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: '**/target/site/jacoco/jacoco.xml'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'target/gestion-signalement.jar'
              ArtifactName: 'jar-artifact'

  - stage: CodeAnalysis
    displayName: 'Analyse de code statique'
    dependsOn: Build
    condition: succeeded()
    jobs:

      - job: StaticAnalysis
        steps:

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '8'
              jdkArchitectureOption: 'x64'

          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              path: '$(HOME)/.m2/repository'

          - task: Maven@3
            displayName: 'Checkstyle'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'checkstyle:checkstyle'

          - task: Maven@3
            displayName: 'SpotBugs'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'compile spotbugs:spotbugs'
              options: '-DskipTests'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'target/spotbugs'
              ArtifactName: 'spotbugs-report'

      # ============================
      # SONARQUBE DISABLED
      # ============================
      # - job: SonarQube
      #   displayName: 'Analyse SonarQube (DISABLED)'
      #   steps:
      #     - task: JavaToolInstaller@0
      #       inputs:
      #         versionSpec: '17'
      #         jdkArchitectureOption: 'x64'
      #     - task: Maven@3
      #       inputs:
      #         goals: 'verify sonar:sonar'

  - stage: DockerBuild
    dependsOn: CodeAnalysis
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        )
      )
    variables:
      - group: dockerhub-config

    jobs:
      - job: Docker
        steps:

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '8'
              jdkArchitectureOption: 'x64'

          - task: Maven@3
            inputs:
              goals: 'package'
              options: '-DskipTests'

          - task: Docker@2
            inputs:
              containerRegistry: 'DockerHubServiceConnection'
              repository: '$(DOCKERHUB_REPOSITORY)'
              command: 'buildAndPush'
              Dockerfile: 'Dockerfile'
              tags: |
                $(IMAGE_TAG)
                latest

  - stage: Deploy
    dependsOn: DockerBuild
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    variables:
      - group: dockerhub-config
      - group: db-config

    jobs:
      - deployment: DeployToLocalVM
        environment: 'production'
        pool:
          name: 'Default'

        strategy:
          runOnce:
            deploy:
              steps:

                - task: DownloadBuildArtifacts@1
                  inputs:
                    artifactName: 'k8s-manifests'

                - task: Bash@3
                  inputs:
                    targetType: inline
                    script: |
                      export KUBECONFIG="$HOME/.kube/config"
                      kubectl cluster-info

                - task: Bash@3
                  inputs:
                    targetType: inline
                    script: |
                      kubectl apply -f mysql.yml

                - task: Bash@3
                  inputs:
                    targetType: inline
                    script: |
                      kubectl apply -f deployment.yml