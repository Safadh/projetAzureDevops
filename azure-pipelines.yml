      #         jdkVersionOption: '1.17'

  - stage: DockerBuild
    displayName: 'Build & Push Image Docker'
    dependsOn: CodeAnalysis
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        )
      )
    variables:
      - group: dockerhub-config

    jobs:
      - job: Docker
        steps:

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '8'

          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              path: '$(HOME)/.m2/repository'

          - task: Maven@3
            displayName: 'Package JAR'
            inputs:
              goals: 'package'
              options: '-DskipTests'

          - task: Docker@2
            displayName: 'Build & Push image vers Docker Hub'
            inputs:
              containerRegistry: 'DockerHubServiceConnection'
              repository: '$(DOCKERHUB_REPOSITORY)'
              command: 'buildAndPush'
              Dockerfile: 'Dockerfile'
              tags: |
                $(IMAGE_TAG)
                latest

          - task: PublishBuildArtifacts@1
            displayName: 'Publier manifests K8s'
            inputs:
              PathtoPublish: 'k8s'
              ArtifactName: 'k8s-manifests'

  - stage: Deploy
    displayName: 'Déploiement sur VM locale (k3s)'
    dependsOn: DockerBuild
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    variables:
      - group: dockerhub-config
      - group: db-config

    jobs:
      - deployment: DeployToLocalVM
        environment: 'production'
        pool:
          name: 'Default'

        strategy:
          runOnce:
            deploy:
              steps:

                - task: DownloadBuildArtifacts@1
                  inputs:
                    artifactName: 'k8s-manifests'

                - task: Bash@3
                  displayName: 'kubectl setup'
                  inputs:
                    targetType: inline
                    script: |
                      export KUBECONFIG="$HOME/.kube/config"
                      kubectl cluster-info

                - task: Bash@3
                  displayName: 'Deploy MySQL'
                  inputs:
                    targetType: inline
                    script: |
                      kubectl apply -f mysql.yml

                - task: Bash@3
                  displayName: 'Deploy App'
                  inputs:
                    targetType: inline
                    script: |
                      kubectl apply -f deployment.yml